services:
    sworn-explorer:
        name: sworn-explorer
        hosts:
            - sworn-explorer.chitacloud.dev
        port: 8080
        ttl: 14400
        memory: 256
        cpu: 0.25
        dockerfile: Dockerfile
        docker_context: .
        handler: Handle
        public_invoke: true
        files:
            - main.go
            - go.mod
            - go.sum
            - frontend
            - Dockerfile
        working_directory: /app/data/sworn-explorer
